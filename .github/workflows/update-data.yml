name: Update AI Pulse Data

on:
  schedule:
    # Hourly news sync (at minute 0)
    - cron: '0 * * * *'
    # Daily tools sync (7:00 AM NPT = 1:15 AM UTC)
    - cron: '15 1 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Fetch News
        run: npx tsx fetch-news.ts

      - name: Fetch Tools (Daily at 7:00 AM NPT)
        # Only run tool fetch during the 1:15 AM UTC schedule
        if: github.event.schedule == '15 1 * * *' || github.event_name == 'workflow_dispatch'
        run: npx tsx fetch-tools.ts

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/*.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: automated data update [$(date -u +'%Y-%m-%d %H:%M:%S') UTC]"
            git push
          fi
